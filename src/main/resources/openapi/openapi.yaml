openapi: 3.1.0
info:
  title: VIPLEV API
  description: Her skal være en beskrivelse.
  version: 0.0.1

tags:
  - name: Auth
    description: Auth related stuff



paths:

  /v1/auth/login:
    post:
      summary: Login
      operationId: login
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestDTO'
      responses:
        '200':
          description: Successfully authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponseDTO'

components:
  schemas:
    LoginRequestDTO:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string

    LoginResponseDTO:
      type: object
      required:
        - token
      properties:
        token:
          type: string
