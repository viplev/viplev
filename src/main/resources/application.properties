spring.application.name=api

server.port=${SERVER_PORT:8080}

# Liquibase configuration
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/migrations/liquibase.yaml

# PostgreSQL configuration
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOSTNAME:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DATABASE:viplev}
spring.datasource.username=${POSTGRES_USERNAME:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:password}

# 
security.jwt.secret-key=${JWT_SECRET_KEY:secret}